<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --border: #30363d;
      --primary: #58a6ff;
      --success: #3fb950;
      --text: #e6edf3;
      --muted: #8b949e;
      --tag-bg: #1f2937;
      --tag-text: #a5d6ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* HEADER */
    header {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-mark {
      background: var(--primary);
      color: var(--bg);
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 14px;
    }
    .buy-badge {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: border-color 0.2s;
    }
    .buy-badge:hover { border-color: var(--primary); color: var(--primary); }

    /* HERO */
    .hero {
      padding: 60px 0 40px;
      text-align: center;
    }
    .hero h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      font-size: 18px;
      color: var(--muted);
      max-width: 560px;
      margin: 0 auto 32px;
    }

    /* SEARCH */
    .search-wrap {
      max-width: 560px;
      margin: 0 auto 20px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 14px 18px 14px 48px;
      font-size: 16px;
      font-family: inherit;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    /* FILTER PILLS */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
    }
    .filter-pill {
      padding: 6px 14px;
      border-radius: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-pill:hover { border-color: var(--primary); color: var(--text); }
    .filter-pill.active {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--bg);
      font-weight: 600;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      padding-bottom: 60px;
    }

    /* CARD */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.3s ease-out;
    }
    .card:hover { border-color: var(--primary); transform: translateY(-2px); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .card-owner { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .card-desc { font-size: 14px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; min-height: 42px; }

    .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .tag {
      padding: 3px 8px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 11px;
      border-radius: 4px;
      font-weight: 500;
    }

    .install-toggle {
      font-size: 13px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 8px;
    }
    .install-toggle:hover { color: var(--primary); }
    .install-code {
      display: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--success);
      word-break: break-all;
    }
    .install-code.show { display: block; }

    .copy-btn {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .copy-btn:hover { opacity: 0.85; }
    .copy-btn.copied { background: var(--success); }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--success);
      color: var(--bg);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* NO RESULTS */
    .no-results {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      grid-column: 1 / -1;
    }
    .no-results h3 { color: var(--text); margin-bottom: 8px; }
  </style>
</head>

let currentCat = 'all';
let searchQ = '';

const grid = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');
const filters = document.getElementById('filters');
const toast = document.getElementById('toast');

function render() {
  const q = searchQ.toLowerCase();
  const filtered = servers.filter(s => {
    const matchCat = currentCat === 'all' || s.categories.includes(currentCat);
    const matchSearch = !q || s.name.toLowerCase().includes(q) || s.description.toLowerCase().includes(q) || s.categories.some(c => c.includes(q));
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results"><h3>No servers found</h3><p>Try a different search or category</p></div>';
    return;
  }

  grid.innerHTML = filtered.map((s, i) => `
    <div class="card" style="animation-delay: ${i * 30}ms">
      <div class="card-header">
        <div>
          <div class="card-title">${s.name}</div>
          <div class="card-owner">${s.owner}</div>
        </div>
      </div>
      <div class="card-desc">${s.description}</div>
      <div class="tags">${s.categories.map(c => `<span class="tag">${c}</span>`).join('')}</div>
      <button class="install-toggle" onclick="toggleInstall(this)">
        <span>How to install</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="install-code">${s.installCmd}</div>
      <button class="copy-btn" onclick="copyConfig(this, ${servers.indexOf(s)})">Copy .mcp.json config</button>
    </div>
  `).join('');
}

function toggleInstall(btn) {
  const code = btn.nextElementSibling;
  code.classList.toggle('show');
  btn.querySelector('span').textContent = code.classList.contains('show') ? 'Hide install' : 'How to install';
}

function copyConfig(btn, idx) {
  const config = JSON.stringify(servers[idx].mcpJson, null, 2);
  navigator.clipboard.writeText(config).then(() => {
    btn.classList.add('copied');
    btn.textContent = 'Copied!';
    showToast('Config copied to clipboard!');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = 'Copy .mcp.json config';
    }, 2000);
  });
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

filters.addEventListener('click', e => {
  if (e.target.classList.contains('filter-pill')) {
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    e.target.classList.add('active');
    currentCat = e.target.dataset.cat;
    render();
  }
});

searchInput.addEventListener('input', e => {
  searchQ = e.target.value;
  render();
});

document.getElementById('buyBtn').addEventListener('click', e => {
  e.preventDefault();
  window.open(CHECKOUT_URL, '_blank');
});

render();
searchInput.focus();
</script>
